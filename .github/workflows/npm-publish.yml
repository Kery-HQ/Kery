name: Publish npm packages

# Fires when you publish a GitHub Release (tag e.g. v0.1.2).
# Job graph:
#   publish-client ─┐
#                   ├─► publish-mcp
#   publish-keryai ─┘  (mcp depends on @keryai/client being live first)

on:
  release:
    types: [published]
  workflow_dispatch: # allow manual re-runs from the Actions tab

jobs:
  # ── @keryai/client ────────────────────────────────────────────────────────────
  publish-client:
    name: Publish @keryai/client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci
        working-directory: packages/client

      - name: Build
        run: npm run build
        working-directory: packages/client

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── keryai (CLI) ──────────────────────────────────────────────────────────────
  publish-keryai:
    name: Publish keryai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci
        working-directory: packages/kery

      - name: Build
        run: npm run build
        working-directory: packages/kery

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/kery
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── @keryai/mcp ───────────────────────────────────────────────────────────────
  # Must run after publish-client so the fresh @keryai/client version is resolvable.
  publish-mcp:
    name: Publish @keryai/mcp
    runs-on: ubuntu-latest
    needs: publish-client
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci
        working-directory: packages/mcp

      - name: Build
        run: npm run build
        working-directory: packages/mcp

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
