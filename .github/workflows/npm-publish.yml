name: Publish npm packages

# Fires when you publish a GitHub Release or via manual dispatch.
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Each package is enrolled at npmjs.com → package settings → Publishing access.
#
# Publishes are idempotent: if a package's local version already exists
# on the registry, that job skips its publish step (no failure).
#
# Note: --provenance is intentionally NOT used. It requires a PUBLIC source repo;
# this repo is private, so provenance bundles get rejected by npm.
#
# Job graph:
#   publish-client ─┐
#                   ├─► publish-mcp  (mcp depends on @keryai/client being live)
#   publish-keryai ─┘

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-client:
    name: Publish @keryai/client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (Trusted Publishing requires >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install (skip internal postinstall builds)
        run: npm ci --ignore-scripts
      - name: Check if already published
        id: check
        run: |
          VERSION=$(node -p "require('./packages/client/package.json').version")
          if npm view "@keryai/client@${VERSION}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "@keryai/client@${VERSION} already on npm — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish @keryai/client@${VERSION}."
          fi
      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build --workspace=packages/client
      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/client --access public

  publish-keryai:
    name: Publish keryai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install
        run: npm ci --ignore-scripts
      - name: Check if already published
        id: check
        run: |
          VERSION=$(node -p "require('./packages/kery/package.json').version")
          if npm view "keryai@${VERSION}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "keryai@${VERSION} already on npm — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish keryai@${VERSION}."
          fi
      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build --workspace=packages/kery
      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/kery --access public

  publish-mcp:
    name: Publish @keryai/mcp
    runs-on: ubuntu-latest
    needs: publish-client
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install
        run: npm ci --ignore-scripts
      - name: Check if already published
        id: check
        run: |
          VERSION=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "@keryai/mcp@${VERSION}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "@keryai/mcp@${VERSION} already on npm — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish @keryai/mcp@${VERSION}."
          fi
      - name: Build @keryai/client (local dep needed for type resolution)
        if: steps.check.outputs.skip == 'false'
        run: npm run build --workspace=packages/client
      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build --workspace=packages/mcp
      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/mcp --access public
