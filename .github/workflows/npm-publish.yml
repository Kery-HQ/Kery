name: Publish npm packages

# Fires when you publish a GitHub Release (tag e.g. v0.1.3) or via manual dispatch.
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Each package is enrolled at npmjs.com → package settings → Publishing access.
#
# Job graph:
#   publish-client ─┐
#                   ├─► publish-mcp
#   publish-keryai ─┘  (mcp depends on @keryai/client being live first)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-client:
    name: Publish @keryai/client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (Trusted Publishing requires >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install (root, skip internal postinstall builds)
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build --workspace=packages/client
      - name: Publish
        run: npm publish --workspace=packages/client --provenance --access public

  publish-keryai:
    name: Publish keryai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build --workspace=packages/kery
      - name: Publish
        run: npm publish --workspace=packages/kery --provenance --access public

  publish-mcp:
    name: Publish @keryai/mcp
    runs-on: ubuntu-latest
    needs: publish-client
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build --workspace=packages/mcp
      - name: Publish
        run: npm publish --workspace=packages/mcp --provenance --access public
