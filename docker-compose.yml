version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kery
      POSTGRES_PASSWORD: kery
      POSTGRES_DB: kery
    ports:
      - "19832:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kery"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "19833:19833"
    environment:
      DATABASE_URL: postgresql://kery:kery@postgres:5432/kery
      PORT: 19833
      APP_URL: http://localhost:19834
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-openai/gpt-4.1-mini}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-gemini-2.5-flash-lite}
      REVIEW_MODEL: ${REVIEW_MODEL:-gemini-2.5-flash-lite}
      REVIEW_AGENT_MODEL: ${REVIEW_AGENT_MODEL:-anthropic/claude-sonnet-4.6}
      SCRIPT_MODEL: ${SCRIPT_MODEL:-gemini-2.5-flash}
      STAGEHAND_ENABLED: ${STAGEHAND_ENABLED:-true}
      STAGEHAND_MODEL: ${STAGEHAND_MODEL:-google/gemini-2.0-flash}
      RUN_TIMEOUT_MINUTES: ${RUN_TIMEOUT_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "19834:80"
    depends_on:
      - api

volumes:
  pgdata:
